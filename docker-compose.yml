services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vericode
      POSTGRES_PASSWORD: vericode_pass
      POSTGRES_DB: vericode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vericode"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
